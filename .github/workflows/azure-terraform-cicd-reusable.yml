name: Azure Terraform CI/CD (Reusable)

# ============================================================================
# REUSABLE WORKFLOW — Azure Terraform CI/CD
# ============================================================================
#
# This file is hosted at: nathlan/shared-assets/.github/workflows/azure-terraform-cicd-reusable.yml
#
# Teams call this workflow from their own repositories to standardize Terraform
# deployments to Azure across the organization.
#
# See sync/.github/workflows/azure-terraform-cicd-caller.yml for usage example.
#
# ============================================================================
# AUTHENTICATION MODEL: Flexible Federated Identity Credentials
# ============================================================================
#
# This workflow uses Azure Managed Identities with flexible federated
# credentials for OIDC authentication — no stored secrets required.
#
# Federated credential policy (configured on the TFSTATE identity):
#   claims['sub'] matches 'repo:<ORG>/*'
#   AND claims['job_workflow_ref'] matches '<ORG>/shared-assets/.github/workflows/azure-terraform-cicd-reusable@refs/heads/main'
#
# This means ANY repo in the org can authenticate when calling this specific
# reusable workflow, without needing per-repo federated credentials or
# GitHub environment gates.
#
# SECURITY MODEL: Principle of Least Privilege
# --------------------------------------------
# Each consuming repository provides TWO managed identities via repo-level vars:
#
# 1. PLAN IDENTITY (Reader Role):
#    - Var: AZURE_CLIENT_ID_PLAN
#    - Permission: Reader at subscription scope
#    - Used for: terraform plan (read-only assessment)
#
# 2. APPLY IDENTITY (Owner Role):
#    - Var: AZURE_CLIENT_ID_APPLY
#    - Permission: Owner at subscription scope
#    - Used for: terraform apply (create/modify/delete resources)
#
# INHERITED VARS (resolved from the calling repo's context):
# ----------------------------------------------------------
# Organisation-level vars (set once at org level, inherited by all repos):
#   AZURE_CLIENT_ID_TFSTATE       — Managed Identity client ID for state access
#   AZURE_SUBSCRIPTION_ID_TFSTATE — Azure subscription ID for Terraform state backend
#   AZURE_TENANT_ID               — Azure AD tenant ID
#   BACKEND_STORAGE_ACCOUNT       — Storage account name for Terraform state
#   BACKEND_CONTAINER             — Blob container name for Terraform state
#
# Repository-level vars (set per consuming repo):
#   AZURE_CLIENT_ID_PLAN     — Managed Identity client ID for plan (Reader)
#   AZURE_CLIENT_ID_APPLY    — Managed Identity client ID for apply (Owner)
#   AZURE_SUBSCRIPTION_ID    — Target Azure subscription ID
#
# No secrets are required — all values are non-sensitive identifiers resolved
# via OIDC token exchange.
#
# REFERENCES:
# -----------
# - Flexible Federated Credentials: https://learn.microsoft.com/en-us/entra/workload-id/workload-identities-flexible-federated-identity-credentials
# - Terraform AzureRM OIDC: https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/guides/managed_service_identity
# ============================================================================

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory containing Terraform code'
        required: false
        type: string
        default: 'terraform'

permissions:
  contents: read
  pull-requests: write
  id-token: write
  issues: write
  security-events: write

jobs:
  # ============================================================================
  # Job 1: Validate — Terraform formatting, validation, and linting
  # ============================================================================
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ inputs.working-directory }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        working-directory: ${{ inputs.working-directory }}
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint Init
        working-directory: ${{ inputs.working-directory }}
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        id: tflint
        working-directory: ${{ inputs.working-directory }}
        run: tflint --format=compact
        continue-on-error: true

      - name: Comment Validation Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format and Style 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### TFLint 📖 \`${{ steps.tflint.outcome }}\`

            *Pusher: @${{ github.actor }}, Working Directory: \`${{ inputs.working-directory }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format and Style')
            });

            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

      - name: Fail if validation failed
        if: steps.fmt.outcome == 'failure' || steps.init.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: |
          echo "::error::Validation failed. Please fix the errors above."
          exit 1

  # ============================================================================
  # Job 2: Security — Checkov security scanning
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          python -m pip install checkov

      - name: Run Checkov
        id: checkov
        run: |
          CONFIG_FILE=""
          if [ -f "${{ inputs.working-directory }}/checkov.yml" ]; then
            CONFIG_FILE="--config-file ${{ inputs.working-directory }}/checkov.yml"
          elif [ -f "${{ inputs.working-directory }}/.checkov.yml" ]; then
            CONFIG_FILE="--config-file ${{ inputs.working-directory }}/.checkov.yml"
          fi
          checkov --directory ${{ inputs.working-directory }} $CONFIG_FILE

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: ${{ inputs.working-directory }}/results.sarif
        continue-on-error: true

      - name: Comment Security Results on PR
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v7
        env:
          CHECKOV_OUTCOME: ${{ steps.checkov.outcome }}
        with:
          script: |
            const checkovOutcome = process.env.CHECKOV_OUTCOME;
            const output = `#### Security Scan (Checkov) \`${checkovOutcome}\`

            ${checkovOutcome === 'failure' ? '⚠️ Security issues found. Review workflow logs for details.' : '✅ No security issues found.'}

            *For details, see the workflow run logs.*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Security Scan (Checkov)')
            });

            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

  # ============================================================================
  # Job 3: Plan — Generate Terraform plan
  # ============================================================================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      # ----------------------------------------------------------------
      # Backend auth: credentials passed via -backend-config so they are
      # persisted in .terraform/ and used for ALL subsequent state
      # operations, independent of ARM_* env vars set for the provider.
      # ----------------------------------------------------------------
      - name: Initialize Terraform using `tfstate` identity
        working-directory: ${{ inputs.working-directory }}
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.BACKEND_CONTAINER }}" \
            -backend-config="key=azure.tfstate" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID_TFSTATE }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID_TFSTATE }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      # ----------------------------------------------------------------
      # Workspace: select or create. Uses repository name as workspace.
      # ----------------------------------------------------------------
      - name: Select or Create Terraform Workspace
        working-directory: ${{ inputs.working-directory }}
        run: |
          WORKSPACE="${{ github.event.repository.name }}"
          echo "Selecting workspace: ${WORKSPACE}"
          terraform workspace select "${WORKSPACE}" 2>/dev/null || terraform workspace new "${WORKSPACE}"

      # ----------------------------------------------------------------
      # Provider auth: ARM_* env vars are used by the azurerm provider
      # for resource operations. The backend ignores these because its
      # credentials were persisted via -backend-config above.
      # ----------------------------------------------------------------
      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working-directory }}
        run: |
          terraform plan -no-color -out=tfplan -lock-timeout=300s
          terraform show -no-color tfplan > plan.txt
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_PLAN }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Save Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            ${{ inputs.working-directory }}/tfplan
            ${{ inputs.working-directory }}/plan.txt
          retention-days: 30

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = '${{ inputs.working-directory }}/plan.txt';
            const plan = fs.readFileSync(planPath, 'utf8');
            const maxLength = 65000;
            const truncatedPlan = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n\n... (truncated)'
              : plan;

            const output = `#### Terraform Plan 📖
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`${{ inputs.working-directory }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Plan 📖')
            });

            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

  # ============================================================================
  # Job 4: Apply — Deploy infrastructure (main branch only)
  # ============================================================================
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ inputs.working-directory }}

      # ----------------------------------------------------------------
      # Backend auth: same pattern as plan job — persist TFSTATE identity
      # credentials via -backend-config.
      # ----------------------------------------------------------------
      - name: Initialize Terraform using `tfstate` identity
        working-directory: ${{ inputs.working-directory }}
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.BACKEND_CONTAINER }}" \
            -backend-config="key=azure.tfstate" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID_TFSTATE }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID_TFSTATE }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Select or Create Terraform Workspace
        working-directory: ${{ inputs.working-directory }}
        run: |
          WORKSPACE="${{ github.event.repository.name }}"
          echo "Selecting workspace: ${WORKSPACE}"
          terraform workspace select "${WORKSPACE}" 2>/dev/null || terraform workspace new "${WORKSPACE}"

      # ----------------------------------------------------------------
      # Provider auth: ARM_* env vars target the APPLY identity (Owner
      # role) for resource modifications. Backend uses persisted TFSTATE
      # identity.
      # ----------------------------------------------------------------
      - name: Terraform Apply
        working-directory: ${{ inputs.working-directory }}
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Output
        id: output
        working-directory: ${{ inputs.working-directory }}
        run: terraform output -json > outputs.json
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: ${{ inputs.working-directory }}/outputs.json
          retention-days: 30
